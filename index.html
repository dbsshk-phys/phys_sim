<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dbsshk Phys simulations</title>
    <!-- We use Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; }
        .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="text-slate-800 font-sans antialiased flex flex-col min-h-screen">

    <!-- Header Section -->
    <header class="bg-slate-800 text-white py-16 px-6 shadow-md text-center">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-5xl font-bold mb-4">dbsshk Physics</h1>
            <p class="text-slate-300 text-xl">Interactive physics simulations and visualizations.</p>
        </div>
    </header>

    <!-- Main Content / Categories -->
    <main class="max-w-4xl mx-auto px-6 py-16 w-full flex-grow flex flex-col justify-center">
        
        <h2 class="text-3xl font-semibold mb-8 text-center text-slate-700">Choose your track</h2>
        
        <!-- Grid Container -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

            <!-- Category 1: HKDSE -->
            <a href="hkdse.html" class="block bg-white rounded-2xl shadow-sm border border-slate-200 p-8 card-hover no-underline text-center">
                <div class="w-20 h-20 mx-auto bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-6 text-4xl">
                    📚
                </div>
                <h3 class="text-2xl font-bold mb-3 text-slate-800">HKDSE Physics</h3>
                <p class="text-slate-600 text-base">Core curriculum simulations including orbits, optics, and waves.</p>
            </a>

            <!-- Category 2: HKPhO (Password Protected) -->
            <a href="#" onclick="checkPassword(event)" class="block bg-white rounded-2xl shadow-sm border border-slate-200 p-8 card-hover no-underline text-center cursor-pointer">
                <div class="w-20 h-20 mx-auto bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mb-6 text-4xl">
                    🔒
                </div>
                <h3 class="text-2xl font-bold mb-3 text-slate-800">HKPhO</h3>
                <p class="text-slate-600 text-base">Advanced problems, Olympiad training, and complex system visualizations.</p>
            </a>

        </div>
    </main>

    <footer class="text-center py-8 text-slate-500 text-sm mt-auto border-t border-slate-200">
        <p>Created for awesome dbs physics students.</p>
    </footer>

    <!-- Password Script -->
    <script>
        function checkPassword(event) {
            event.preventDefault(); // Prevent default link behavior
            const password = prompt("This section is restricted. Please enter the password:");
            
            // Change "dbsphysics" to whatever password you want
            if (password === "dbsphysics") {
                // If correct, redirect to the HKPhO page
                window.location.href = "hkpho.html";
            } else if (password !== null) {
                // If incorrect (and they didn't just press cancel), show an alert
                alert("Incorrect password!");
            }
        }
    </script>
</body>
</html>
